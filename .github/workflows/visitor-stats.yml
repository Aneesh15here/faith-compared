name: Update visitor stats

on:
  schedule:
    - cron: '17 3 * * *'   # daily, 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch country stats from GoatCounter
        env:
          TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "GOATCOUNTER_TOKEN secret not set — skipping (add it in repo Settings → Secrets)."
            exit 0
          fi
          mkdir -p data
          URL="https://comparereligion.goatcounter.com/api/v0/stats/locations?start=2026-07-01T00:00:00Z&end=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for attempt in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /tmp/locations.json -w "%{http_code}" -H "Authorization: Bearer $TOKEN" "$URL")
            echo "Attempt $attempt: HTTP status $HTTP_CODE"
            if [ "$HTTP_CODE" -lt 400 ]; then
              break
            fi
            echo "Error response body:"
            cat /tmp/locations.json
            if [ "$attempt" -lt 5 ]; then
              sleep $((attempt * 10))
            fi
          done
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "All retries failed with HTTP $HTTP_CODE"
            exit 1
          fi
          jq '{
            updated: (now | todate),
            total: ([.stats[]?.count] | add // 0),
            countries: [ .stats[]? | { code: .id, name: .name, count: .count } ] | sort_by(-.count)
          }' /tmp/locations.json > data/countries.json
          cat data/countries.json

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/countries.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update visitor stats"
            git push
          fi
