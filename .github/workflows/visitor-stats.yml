name: Update visitor stats

on:
  schedule:
    - cron: '17 3 * * *'   # daily, 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch country stats from GoatCounter
        env:
          TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "GOATCOUNTER_TOKEN secret not set — skipping (add it in repo Settings → Secrets)."
            exit 0
          fi
          mkdir -p data
          curl -sf \
            -H "Authorization: Bearer $TOKEN" \
            "https://comparereligion.goatcounter.com/api/v0/stats/locations?start=2026-07-01T00:00:00Z&end=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o /tmp/locations.json
          jq '{
            updated: (now | todate),
            total: ([.stats[]?.count] | add // 0),
            countries: [ .stats[]? | { code: .id, name: .name, count: .count } ] | sort_by(-.count)
          }' /tmp/locations.json > data/countries.json
          cat data/countries.json

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/countries.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update visitor stats"
            git push
          fi
